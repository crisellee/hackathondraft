name: my_app
description: "ConcernTrack - Student Concern Tracking System"
publish_to: 'none'
version: 1.0.0+1


environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.1
  firebase_storage: ^12.1.1
  google_sign_in: ^6.2.1
  file_picker: ^8.0.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  csv: ^6.0.0
  pdf: ^3.10.8
  printing: ^5.11.1
  uuid: ^4.4.0
  share_plus: ^10.1.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.1.0
  google_generative_ai: ^0.4.0
  flutter_native_splash: ^2.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


# Splash screen configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash_logo.png
